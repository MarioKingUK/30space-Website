<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ChatApp</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f7f7fb;
      color: #111;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }
    .card {
      width: min(560px, 92vw);
      background: white;
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.08);
      text-align: center;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 40px;
    }
    p {
      font-size: 18px;
      line-height: 1.5;
      margin: 10px 0;
    }
    .button {
      display: inline-block;
      margin-top: 20px;
      padding: 14px 22px;
      border-radius: 999px;
      background: #111;
      color: white;
      text-decoration: none;
      font-weight: 600;
    }
    .small {
      margin-top: 22px;
      font-size: 15px;
      color: #666;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>ChatApp</h1>
    <p>Private messaging with friends</p>
    <p><a class="button" href="https://30space.com/chatapp0001">Open ChatApp</a></p>
    <p class="small">Beta / install instructions</p>
  </main>
</body>
</html>
