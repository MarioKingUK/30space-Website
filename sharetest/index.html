<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ShareTest</title>
  
  <meta name="apple-itunes-app" content="app-clip-bundle-id=com.AITest.ShareTest.Clip, app-id=YOUR_APP_STORE_ID">
  
  <meta name="description" content="Private messaging with friends." />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="ShareTest" />
  <meta property="og:description" content="Private messaging with friends." />
  <meta property="og:url" content="https://30space.com/sharetest" />
  <meta property="og:image" content="https://30space.com/sharetest/chat-icon-1.jpg" />

  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f7f7fb; color: #111; display: grid; place-items: center; min-height: 100vh; }
    .card { width: min(560px, 92vw); background: white; border-radius: 20px; padding: 32px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08); text-align: center; }
    h1 { margin: 0 0 12px; font-size: 40px; }
    p { font-size: 18px; line-height: 1.5; margin: 10px 0; }
    .button { display: inline-block; margin-top: 20px; padding: 14px 22px; border-radius: 999px; background: #111; color: white; text-decoration: none; font-weight: 600; cursor: pointer; border: none; font-size: 18px; }
    .small { margin-top: 22px; font-size: 15px; color: #666; }
    .preview-image { width: 96px; height: 96px; object-fit: cover; border-radius: 22px; margin-bottom: 20px; }
  </style>
</head>
<body>
  <main class="card">
    <img class="preview-image" src="/sharetest/chat-icon-1.jpg" alt="ShareTest icon" />
    <h1>ShareTest</h1>
    <p>Private messaging with friends</p>
    
    <button class="button" onclick="handleDownload()">Download ShareTest</button>
    
    <p class="small">Beta / install instructions</p>
  </main>

  <script>
    function handleDownload() {
      // 1. Get username from URL (e.g., https://30space.com/sharetest?u=fai) [cite: 49]
      const params = new URLSearchParams(window.location.search);
      const inviter = params.get('u') || 'friend';
      const joinToken = `join:${inviter}`;
      const appStoreUrl = "https://apps.apple.com/app/idYOUR_APP_ID"; 

      // 2. The Clipboard Bridge handshake [cite: 18, 51]
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(joinToken)
          .then(() => { window.location.href = appStoreUrl; })
          .catch(() => { fallbackCopy(joinToken, appStoreUrl); });
      } else {
        fallbackCopy(joinToken, appStoreUrl);
      }
    }

    function fallbackCopy(text, url) {
      const textArea = document.createElement("textarea");
      textArea.value = text;
      textArea.style.position = "fixed"; 
      document.body.appendChild(textArea);
      textArea.select();
      try { document.execCommand('copy'); } catch (err) {}
      document.body.removeChild(textArea);
      window.location.href = url;
    }
  </script>
</body>
</html>
